<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Listas e Tabelas - HTML5">
    <meta name="keywords" content="HTML5, listas, tabelas, exemplo, tutorial">
    <meta name="author" content="Seu Nome">
    <title>Listas e Tabelas - HTML5</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Dados Gerais</legend>

            <label for="nome">Nome:</label> 
            <input type="text" minlength="3" id="nome"/><br/>
            
            <label for="data_nascimento">Data de Nascimento:</label>
            <input type="date" id="data_nascimento"/><br/>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00"/>
        </fieldset>

        <fieldset>
            <legend>Endereço</legend>
            <label for="tipo">Tipo:</label>
            <select id="tipo">
                <option value="">Selecione</option>
                <option value="rua">Rua</option>
                <option value="avenida">Avenida</option>
                <option value="praca">Praça</option>
                <option value="alameda">Alameda</option> 
            </select>
        </fieldset>

        <fieldset>
            <legend>Fale conosco:</legend>
            <label for="assunto">Assunto:</label>
            <select id="assunto">
                <option value="">Selecione</option>
                <option value="duvida">Dúvida</option>
                <option value="sugestao">Sugestão</option>
                <option value="reclamacao">Reclamação</option>
                <option value="elogio">Elogio</option>
            </select><br/>
            
            <label for="mensagem">Mensagem:</label><br/>
            <textarea id="mensagem" rows="6" cols="30" placeholder="Digite sua mensagem aqui..."></textarea><br/>
        </fieldset>

        <fieldset>
            <input type="checkbox" id="newsletter" value="sim"/>
            <label for="newsletter">Desejo receber novidades por e-mail</label><br/>
            
            <input type="checkbox" id="termos" value="sim" required/>
            <label for="termos">Li e aceito os termos de uso</label><br/>
            
            <input type="submit" value="Enviar"/>
            <input type="reset" value="Limpar"/><br/>
        </fieldset>

        <fieldset>
            <input type="radio" id="sim" name="contato" value="sim"/>
            <label for="sim">Sim</label>
            
            <input type="radio" id="nao" name="contato" value="nao"/>
            <label for="nao">Não</label><br/>
            
            <input type="radio" id="outro" name="contato" value="outro"/>
            <label for="outro">Outro</label><br/>
            
            <input type="text" id="outro_texto" placeholder="Especifique outro contato"/><br/>
            
            <label for="arquivo">Anexar arquivo:</label><br/>
            <input type="file" id="arquivo" accept=".jpg, .png, .pdf"/><br/>
        </fieldset>
    </form>
</body>
</html>
